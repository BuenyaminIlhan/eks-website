    L 18 42
    Q 18 20 32 20
    L 244 20
    Q 256 20 272 30
    L 326 30
    Q 356 30 376 52
    L 390 72
    Q 400 86 400 104
    L 400 148
    L 358 148
    Q 358 124 334 124
    Q 310 124 310 148
    L 114 148
    Q 114 124 90 124
    Q 66 124 66 148
    Z
  " fill="#1E5A7A"/>

  <!-- Cargo roof line -->
  <path d="M 18 28 L 244 28" stroke="white" stroke-opacity="0.12" stroke-width="2"/>

  <!-- Cargo door partition lines -->
  <path d="M 134 22 L 134 146" stroke="white" stroke-opacity="0.14" stroke-width="1.5"/>
  <path d="M 242 22 L 242 146" stroke="white" stroke-opacity="0.14" stroke-width="1.5"/>

  <!-- Cab window -->
  <path d="
    M 248 28
    L 324 28
    Q 352 28 372 52
    L 386 72
    Q 392 84 392 102
    L 392 110
    L 248 110
    Z
  " fill="white" fill-opacity="0.13"/>

  <!-- Rear lights -->
  <rect x="14" y="44" width="6" height="32" rx="2" fill="white" fill-opacity="0.25"/>

  <!-- Headlights -->
  <rect x="395" y="84" width="7" height="24" rx="2" fill="white" fill-opacity="0.25"/>

  <!-- Rear wheel -->
  <circle cx="90" cy="148" r="28" fill="#0F1F2E"/>
  <circle cx="90" cy="148" r="28" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="90" cy="148" r="11" fill="#1E5A7A"/>

  <!-- Front wheel -->
  <circle cx="334" cy="148" r="28" fill="#0F1F2E"/>
  <circle cx="334" cy="148" r="28" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
  <circle cx="334" cy="148" r="11" fill="#1E5A7A"/>
</svg>
