<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 50" fill="none">
  <!-- Background -->
  <rect width="80" height="50" rx="8" fill="#0F1F2E"/>
  <!-- Motion lines -->
  <line x1="2" y1="20" x2="16" y2="20" stroke="#3982AA" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="4" y1="26" x2="16" y2="26" stroke="#3982AA" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="6" y1="32" x2="16" y2="32" stroke="#3982AA" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Cargo body -->
  <rect x="16" y="10" width="44" height="30" rx="2" fill="#3982AA"/>
  <!-- Cab section -->
  <path d="M60 10 L60 40 L72 40 L76 32 L76 22 L68 10 Z" fill="#3982AA"/>
  <!-- Windshield -->
  <path d="M61 13 L67.5 13 L73 22 L61 22 Z" fill="rgba(255,255,255,0.75)"/>
  <!-- Side window 1 -->
  <rect x="18" y="14" width="12" height="10" rx="1.5" fill="rgba(255,255,255,0.6)"/>
  <!-- Side window 2 -->
  <rect x="33" y="14" width="12" height="10" rx="1.5" fill="rgba(255,255,255,0.6)"/>
  <!-- Door separator -->
  <line x1="30" y1="10" x2="30" y2="40" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>
  <!-- Headlight -->
  <rect x="73" y="22" width="5" height="6" rx="1" fill="#f0c040"/>
  <!-- Wheel 1 -->
  <circle cx="27" cy="41" r="7" fill="#1a2b3c"/>
  <circle cx="27" cy="41" r="4.5" fill="#3982AA"/>
  <circle cx="27" cy="41" r="2" fill="white"/>
  <!-- Wheel 2 -->
  <circle cx="62" cy="41" r="7" fill="#1a2b3c"/>
  <circle cx="62" cy="41" r="4.5" fill="#3982AA"/>
  <circle cx="62" cy="41" r="2" fill="white"/>
</svg>
